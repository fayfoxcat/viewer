name: Release Build

on:
  push:
    tags:
      - '*'  # 仅在推送 v* 标签时触发，例如 v0.0.1

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Set up JDK 8
      uses: actions/setup-java@v5
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
        
    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Get version from tag
      id: get_version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
    - name: Update pom.xml version
      run: mvn versions:set -DnewVersion=${{ steps.get_version.outputs.VERSION }} -DgenerateBackupPoms=false
      
    - name: Build release artifacts
      run: mvn clean package -DskipTests
      
    - name: List build artifacts
      run: |
        echo "构建产物列表："
        ls -lh target/*.jar
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        files: |
          target/viewer-*.jar
        body: |
          ## Viewer ${{ steps.get_version.outputs.VERSION }}
          
          ### 📦 下载说明
          
          - `viewer-${{ steps.get_version.outputs.VERSION }}.jar` - 库文件，用于集成到其他项目
          - `viewer-${{ steps.get_version.outputs.VERSION }}-exec.jar` - 可执行文件，可独立运行
          
          ### 🚀 使用方法
          
          #### 作为库使用
          
          在你的项目 `pom.xml` 中添加：
          
          ```xml
          <dependency>
              <groupId>org.fayfoxcat</groupId>
              <artifactId>viewer</artifactId>
              <version>${{ steps.get_version.outputs.VERSION }}</version>
          </dependency>
          ```
          
          在 `application.yml` 中配置：
          
          ```yaml
          viewer:
             config:
              enable-auth: true
              endpoint: /viewer
              paths:
                - /var/viewer/myapp
          ```
          
          #### 独立运行
          
          ```bash
          # 下载 jar 文件
          wget https://github.com/fayfoxcat/viewer/releases/download/v${{ steps.get_version.outputs.VERSION }}/viewer-${{ steps.get_version.outputs.VERSION }}-exec.jar
          
          # 运行
          java -jar viewer-${{ steps.get_version.outputs.VERSION }}-exec.jar
          
          # 访问
          # http://localhost:1098/viewer
          ```
          
          ### 📚 文档
          
          - [快速开始](https://github.com/fayfoxcat/viewer#快速开始)
          - [完整文档](https://github.com/fayfoxcat/viewer/blob/main/README.md)
          - [更新日志](https://github.com/fayfoxcat/viewer/blob/main/CHANGELOG.md)
          
          ### ✨ 主要特性
          
          - 📁 多目录文件浏览
          - 🔍 文件搜索（支持正则表达式）
          - 📦 压缩文件支持（.zip, .gz）
          - ⬇️ 批量下载
          - 🎨 内容级别高亮
          - 🔒 权限控制
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
