server:
  port: 1098
logging:
  level:
    org.fayfoxcat.viewer: INFO   # Viewer组件日志级别
    root: INFO                     # 根日志级别
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
spring:
  thymeleaf:
    cache: false                    # 开发环境禁用缓存，生产环境建议设为 true
    prefix: classpath:/templates/   # 模板文件路径前缀
    suffix: .html                   # 模板文件后缀
    encoding: UTF-8                 # 模板文件编码
    mode: HTML                      # 模板模式
  security:
    user:
      name: disabled                # 禁用默认用户
      password: disabled            # 禁用默认密码
      roles: []                     # 清空默认角色
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 3600             # 静态资源缓存时间（秒）
          cache-public: true        # 允许公共缓存
  config:
    import: classpath:patterns.yml
viewer:
  config:
    endpoint: /viewer               # 访问端点，默认 /viewer
    enable-auth: false              # 是否启用认证，默认 true
    secret-key:                     # 认证密钥，留空则自动生成
    max-file-size-mb: 100           # 大文件阈值（MB），超过此大小只显示尾部，默认 10MB
    tail-lines: 1000000             # 大文件显示行数，默认 10000 行
    paths:
      - C:/Users/root/Desktop/logs  # 示例：桌面日志目录
  patterns:
    rules:
      wiscom-java-file:
        name: 自定义类高亮
        regex: "(?<=com\\.wiscom.*?)[A-Za-z][A-Za-z0-9_]*\\.java:\\d+"
        class-name: viewer-wiscom-java-file
        color: "#42a5f5"
        description: 匹配自定义包java类
        highlight: true